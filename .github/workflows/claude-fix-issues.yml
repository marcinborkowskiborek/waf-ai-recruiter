name: Claude Auto-Fix Issues

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

jobs:
  claude:
    if: |
      (github.event_name == 'issues') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          direct_prompt: |
            Analyze this GitHub issue and fix it.
            Read the codebase, understand the problem, implement the fix, and create a PR.
            This is a Next.js application with TypeScript, Tailwind CSS, and Vercel AI SDK.
            Always test your changes by running `npm run build` before submitting.
